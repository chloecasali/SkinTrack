name: Lint

on:
  push:
    branches: ["*"]

jobs:
  lint:
    name: Lint code
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
            
      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
              ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: ESLint Check
        run: npm run lint
